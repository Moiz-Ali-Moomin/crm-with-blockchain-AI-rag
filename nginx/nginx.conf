worker_processes auto;

events {
    worker_connections 1024;
}

http {
    default_type  application/octet-stream;

    sendfile on;
    keepalive_timeout 65;

    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;

    # ── TLS Session Cache (shared across workers) ──────────────────────────────
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # ── Strong Cipher Suite (Mozilla Modern) ───────────────────────────────────
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256;
    ssl_prefer_server_ciphers off;

    # ── DH Params (generate once: openssl dhparam -out /etc/nginx/ssl/dhparam.pem 2048) ──
    # ssl_dhparam /etc/nginx/ssl/dhparam.pem;

    # ── OCSP Stapling ──────────────────────────────────────────────────────────
    ssl_stapling        on;
    ssl_stapling_verify on;
    resolver            8.8.8.8 8.8.4.4 valid=300s;
    resolver_timeout    5s;

    # ─────────────────────────────────────────
    # HTTP → HTTPS Redirect
    # ─────────────────────────────────────────
    server {
        listen 80;
        listen [::]:80;

        server_name bestpurchasestore.com www.bestpurchasestore.com;

        # Allow Let's Encrypt ACME challenge through without redirect
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }

        location / {
            return 301 https://$host$request_uri;
        }
    }

    # ─────────────────────────────────────────
    # HTTPS Server
    # ─────────────────────────────────────────
    server {
        listen 443 ssl;
        listen [::]:443 ssl;

        server_name bestpurchasestore.com www.bestpurchasestore.com;

        ssl_certificate     /etc/nginx/ssl/cert.pem;
        ssl_certificate_key /etc/nginx/ssl/key.pem;

        # ── Security Headers ───────────────────────────────────────────────────
        # HSTS: force HTTPS for 1 year, include subdomains, allow preload
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-Content-Type-Options nosniff always;
        add_header X-XSS-Protection "1; mode=block" always;
        add_header Referrer-Policy "strict-origin-when-cross-origin" always;
        add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: https:; font-src 'self' data:; connect-src 'self' wss: https:; frame-ancestors 'none';" always;

        # Hide Nginx version from error pages and headers
        server_tokens off;

        # ── Request limits ─────────────────────────────────────────────────────
        client_max_body_size 10m;

        # ── API ────────────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass http://crm_api:3001/api/;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            proxy_connect_timeout 60s;
            proxy_send_timeout    60s;
            proxy_read_timeout    60s;

            # Buffer tuning
            proxy_buffering    on;
            proxy_buffer_size  4k;
            proxy_buffers      8 4k;
        }

        # ── WebSocket ──────────────────────────────────────────────────────────
        location /socket.io/ {
            proxy_pass http://crm_api:3001;

            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket connections can be long-lived
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # ── Frontend (Next.js) ─────────────────────────────────────────────────
        location / {
            proxy_pass http://crm_web:3000;

            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
