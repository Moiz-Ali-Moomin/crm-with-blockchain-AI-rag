global:
  resolve_timeout: 5m
  smtp_smarthost: 'smtp.gmail.com:587'
  smtp_from: 'alerts@bestpurchasestore.com'
  smtp_auth_username: '${ALERTMANAGER_SMTP_USER}'
  smtp_auth_password: '${ALERTMANAGER_SMTP_PASSWORD}'
  smtp_require_tls: true

# ── Routing tree ───────────────────────────────────────────────────────────────
route:
  receiver: email
  group_by: [alertname, severity, slot]
  group_wait: 30s       # wait before sending first notification for a new group
  group_interval: 5m    # wait before sending follow-up for ongoing group
  repeat_interval: 4h   # re-notify if alert is still firing

  routes:
    # Critical alerts fire immediately, no grouping delay
    - matchers:
        - severity = critical
      receiver: email
      group_wait: 0s
      repeat_interval: 1h

# ── Receivers ─────────────────────────────────────────────────────────────────
receivers:
  - name: email
    email_configs:
      - to: 'moiz.7152@gmail.com'
        send_resolved: true
        headers:
          subject: '[{{ .Status | toUpper }}{{ if eq .Status "firing" }} 🔥{{ else }} ✅{{ end }}] {{ .CommonLabels.alertname }} — {{ .CommonAnnotations.summary }}'
        html: |
          {{ range .Alerts }}
          <b>Alert:</b> {{ .Annotations.summary }}<br/>
          <b>Severity:</b> {{ .Labels.severity }}<br/>
          <b>Description:</b> {{ .Annotations.description }}<br/>
          <b>Started:</b> {{ .StartsAt.Format "2006-01-02 15:04:05 UTC" }}<br/>
          {{ if .EndsAt }}<b>Resolved:</b> {{ .EndsAt.Format "2006-01-02 15:04:05 UTC" }}<br/>{{ end }}
          <hr/>
          {{ end }}

  # Uncomment and fill in to enable Slack notifications
  # - name: slack
  #   slack_configs:
  #     - api_url: '${ALERTMANAGER_SLACK_WEBHOOK}'
  #       channel: '#alerts'
  #       send_resolved: true
  #       title: '[{{ .Status | toUpper }}] {{ .CommonLabels.alertname }}'
  #       text: '{{ .CommonAnnotations.summary }}\n{{ .CommonAnnotations.description }}'

  - name: 'null'

# ── Inhibition rules ──────────────────────────────────────────────────────────
# Suppress warning-level alerts when the same alert is already critical.
inhibit_rules:
  - source_matchers:
      - severity = critical
    target_matchers:
      - severity = warning
    equal: [alertname, slot]
