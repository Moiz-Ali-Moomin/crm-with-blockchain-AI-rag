groups:
  - name: crm_api
    interval: 30s
    rules:
      # ── Error rate spike ─────────────────────────────────────────────────
      - alert: HighErrorRate
        expr: |
          (
            sum(rate(http_requests_total{status=~"5.."}[5m])) by (slot)
            /
            sum(rate(http_requests_total[5m])) by (slot)
          ) > 0.05
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate on slot {{ $labels.slot }}"
          description: "Error rate is {{ $value | humanizePercentage }} on {{ $labels.slot }} — investigate or rollback."

      # ── Latency p99 ──────────────────────────────────────────────────────
      - alert: HighLatency
        expr: |
          histogram_quantile(0.99,
            sum(rate(http_request_duration_seconds_bucket[5m])) by (le, slot)
          ) > 2
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "p99 latency > 2s on slot {{ $labels.slot }}"
          description: "p99 latency is {{ $value | humanizeDuration }} on {{ $labels.slot }}"

      # ── Container OOM ────────────────────────────────────────────────────
      - alert: ContainerOOM
        expr: container_oom_events_total > 0
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Container OOM: {{ $labels.name }}"

  - name: infrastructure
    rules:
      # ── Disk usage ───────────────────────────────────────────────────────
      - alert: DiskSpaceLow
        expr: |
          (node_filesystem_avail_bytes{fstype!~"tmpfs|devtmpfs"}
          / node_filesystem_size_bytes) < 0.15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Disk space < 15% on {{ $labels.mountpoint }}"

      # ── Memory pressure ──────────────────────────────────────────────────
      - alert: HighMemoryUsage
        expr: |
          (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 0.90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Memory usage > 90%"
