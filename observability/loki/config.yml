auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9096

common:
  instance_addr: 127.0.0.1
  path_prefix: /loki
  storage:
    filesystem:
      chunks_directory: /loki/chunks
      rules_directory: /loki/rules
  replication_factor: 1
  ring:
    kvstore:
      store: inmemory

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100

schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

ruler:
  alertmanager_url: http://localhost:9093

limits_config:
  # WHY: 30 days retention keeps storage manageable on a single VPS.
  # Increase if you need longer audit trails.
  retention_period: 720h
  ingestion_rate_mb: 16
  ingestion_burst_size_mb: 32
  # Required for OTEL → Loki: the otelcol-contrib loki exporter pushes
  # non-label OTEL attributes (requestId, tenantId, spanId, etc.) as
  # structured metadata. Without this flag Loki 3.x rejects those fields
  # with a 400, causing the exporter to silently drop the log entry.
  allow_structured_metadata: true
  # Enables per-stream volume tracking, visible in Grafana as a heatmap.
  # Useful for identifying noisy services during initial OTEL rollout.
  volume_enabled: true
