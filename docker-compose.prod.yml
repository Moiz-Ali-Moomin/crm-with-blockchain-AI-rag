version: '3.9'

# ─────────────────────────────────────────────────────────────────────────────
# Production Docker Compose
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d --build
#
# All secrets come from the environment or a .env file in this directory.
# Never commit real credentials — use GitHub Secrets / a secrets manager.
# ─────────────────────────────────────────────────────────────────────────────

services:
  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:16-alpine
    container_name: crm_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-crm_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      POSTGRES_DB: ${POSTGRES_DB:-crm_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-crm_user} -d ${POSTGRES_DB:-crm_db}']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm_internal

  redis:
    image: redis:7-alpine
    container_name: crm_redis
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 512mb
      --maxmemory-policy allkeys-lru
      --requirepass ${REDIS_PASSWORD:-}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - crm_internal

  mongodb:
    image: mongo:7-jammy
    container_name: crm_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER:-crm_mongo}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD:?MONGO_PASSWORD is required}
      MONGO_INITDB_DATABASE: crm_logs
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ['CMD', 'mongosh', '--eval', 'db.adminCommand("ping")']
      interval: 15s
      timeout: 10s
      retries: 5
    networks:
      - crm_internal

  # ── Application ─────────────────────────────────────────────────────────────

  api:
    build:
      context: ./crm-backend
      dockerfile: Dockerfile
    image: ghcr.io/your-org/nexus-crm-api:${IMAGE_TAG:-latest}
    container_name: crm_api
    restart: unless-stopped
    env_file:
      - ./crm-backend/.env
    environment:
      NODE_ENV: production
      PORT: 3001
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      mongodb:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3001/health || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - crm_internal
      - crm_public
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: '1.0'

  web:
    build:
      context: ./crm-frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-https://api.yourcrm.com}
    image: ghcr.io/your-org/nexus-crm-web:${IMAGE_TAG:-latest}
    container_name: crm_web
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 3000
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:3000 || exit 1']
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    networks:
      - crm_public
    deploy:
      resources:
        limits:
          memory: 512m
          cpus: '0.5'

  # ── Reverse Proxy ────────────────────────────────────────────────────────────

  nginx:
    image: nginx:1.25-alpine
    container_name: crm_nginx
    restart: unless-stopped
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - api
      - web
    networks:
      - crm_public

  certbot:
    image: certbot/certbot:latest
    container_name: crm_certbot
    volumes:
      - certbot_www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt
    # Renews certificates; run manually or via cron:
    # docker compose -f docker-compose.prod.yml run --rm certbot renew
    entrypoint: /bin/sh -c "trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done"

# ── Volumes ──────────────────────────────────────────────────────────────────

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  mongo_data:
    driver: local
  certbot_www:
  certbot_conf:

# ── Networks ─────────────────────────────────────────────────────────────────

networks:
  crm_internal:
    # No external access — only app containers reach the databases
    internal: true
  crm_public:
    # Nginx + app containers exposed to the internet
    driver: bridge
