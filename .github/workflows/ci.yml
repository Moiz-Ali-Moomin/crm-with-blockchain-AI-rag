name: CI

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write   # needed to push to ghcr.io

env:
  NODE_VERSION: '20'
  CI: 'true'
  NEXT_TELEMETRY_DISABLED: '1'
  REGISTRY: ghcr.io
  IMAGE_API: ghcr.io/${{ github.repository_owner }}/crm-api
  IMAGE_WEB: ghcr.io/${{ github.repository_owner }}/crm-web

defaults:
  run:
    shell: bash

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Quality gates (run in parallel)
  # ────────────────────────────────────────────────────────────────────────────
  backend-quality:
    name: Backend — lint / typecheck / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: crm-backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  backend-tests:
    name: Backend — unit / integration tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: crm-backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:cov -- --passWithNoTests --runInBand
        env:
          NODE_ENV: test

      # Upload coverage so it can be linked from PRs / Grafana
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: backend-coverage
          path: crm-backend/coverage/

  frontend-quality:
    name: Frontend — lint / typecheck / build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-frontend
    env:
      NPM_CONFIG_LEGACY_PEER_DEPS: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: crm-frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

  # ────────────────────────────────────────────────────────────────────────────
  # Build immutable, versioned Docker images and push to GHCR
  #
  # WHY: Building on the server is dangerous — if the build fails mid-way the
  # server is left in a broken state. CI builds are hermetic, cached, and the
  # resulting image is the exact artifact that gets deployed. The SHA tag makes
  # every build uniquely addressable so rollback = pull a previous tag.
  # ────────────────────────────────────────────────────────────────────────────
  build-and-push:
    name: Build & push images → GHCR
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - backend-tests
      - frontend-quality

    # Only publish images from the main branch (PRs just validate the build)
    outputs:
      image_tag: ${{ steps.meta.outputs.version }}
      api_image: ${{ env.IMAGE_API }}
      web_image: ${{ env.IMAGE_WEB }}

    steps:
      - uses: actions/checkout@v4

      # ── Registry auth ──────────────────────────────────────────────────────
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # ── Build metadata (tags + labels) ────────────────────────────────────
      # Tags produced:
      #   ghcr.io/owner/crm-api:sha-abc1234   ← immutable, used for deploy
      #   ghcr.io/owner/crm-api:main           ← "latest on main" pointer
      #   ghcr.io/owner/crm-api:pr-42          ← PR preview (not pushed to prod)
      - name: Docker metadata — API
        id: meta-api
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_API }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=pr

      - name: Docker metadata — Web
        id: meta-web
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_WEB }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=branch
            type=ref,event=pr

      # Expose the sha tag so CD can reference the exact image
      - name: Export image tag
        id: meta
        run: echo "version=sha-$(git rev-parse --short HEAD)" >> "$GITHUB_OUTPUT"

      # ── Buildx (multi-platform, layer cache) ──────────────────────────────
      - uses: docker/setup-buildx-action@v3

      # ── Build API ─────────────────────────────────────────────────────────
      - name: Build & push — API
        uses: docker/build-push-action@v5
        with:
          context: ./crm-backend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-api.outputs.tags }}
          labels: ${{ steps.meta-api.outputs.labels }}
          cache-from: type=gha,scope=api
          cache-to: type=gha,mode=max,scope=api

      # ── Build Web ─────────────────────────────────────────────────────────
      - name: Build & push — Web
        uses: docker/build-push-action@v5
        with:
          context: ./crm-frontend
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta-web.outputs.tags }}
          labels: ${{ steps.meta-web.outputs.labels }}
          build-args: |
            NEXT_PUBLIC_API_URL=${{ secrets.NEXT_PUBLIC_API_URL }}
            NEXT_PUBLIC_APP_URL=${{ secrets.NEXT_PUBLIC_APP_URL }}
          cache-from: type=gha,scope=web
          cache-to: type=gha,mode=max,scope=web
