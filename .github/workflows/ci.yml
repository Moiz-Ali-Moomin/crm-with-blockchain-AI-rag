name: CI

on:
  push:
    branches:
      - '**'
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  pull_request:
    branches:
      - main
    paths-ignore:
      - 'docs/**'
      - '**/*.md'
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '20'
  CI: 'true'
  NEXT_TELEMETRY_DISABLED: '1'

defaults:
  run:
    shell: bash

jobs:
  backend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: crm-backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build

  backend-tests:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: crm-backend/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npm run test:cov -- --passWithNoTests --runInBand
        env:
          NODE_ENV: test

  frontend-quality:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: crm-frontend
    env:
      NPM_CONFIG_LEGACY_PEER_DEPS: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: crm-frontend/package-lock.json

      - run: npm ci
      - run: npm run lint
      - run: npx tsc --noEmit
      - run: npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001

  docker-validate:
    runs-on: ubuntu-latest
    needs:
      - backend-quality
      - backend-tests
      - frontend-quality
    strategy:
      matrix:
        service:
          - name: backend
            context: ./crm-backend
            tag: crm-api:ci
            build-args: ''
          - name: frontend
            context: ./crm-frontend
            tag: crm-web:ci
            build-args: |
              NEXT_PUBLIC_API_URL=http://localhost:3001
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/build-push-action@v5
        with:
          context: ${{ matrix.service.context }}
          push: false
          tags: ${{ matrix.service.tag }}
          build-args: ${{ matrix.service.build-args }}