name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NODE_VERSION: '20'

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # Lint — ESLint on both apps
  # ────────────────────────────────────────────────────────────────────────────
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            crm-backend/package-lock.json
            crm-frontend/package-lock.json

      - name: Install backend deps
        working-directory: crm-backend
        run: npm ci

      - name: Install frontend deps
        working-directory: crm-frontend
        run: npm ci

      - name: Lint backend
        working-directory: crm-backend
        run: npm run lint

      - name: Lint frontend
        working-directory: crm-frontend
        run: npm run lint

  # ────────────────────────────────────────────────────────────────────────────
  # Typecheck — tsc --noEmit on both apps
  # ────────────────────────────────────────────────────────────────────────────
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            crm-backend/package-lock.json
            crm-frontend/package-lock.json

      - name: Install backend deps
        working-directory: crm-backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: crm-backend
        run: npx prisma generate

      - name: Typecheck backend
        working-directory: crm-backend
        run: npx tsc --noEmit

      - name: Install frontend deps
        working-directory: crm-frontend
        run: npm ci

      - name: Typecheck frontend
        working-directory: crm-frontend
        run: npx tsc --noEmit

  # ────────────────────────────────────────────────────────────────────────────
  # Test — Jest unit tests (backend)
  # ────────────────────────────────────────────────────────────────────────────
  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: crm-backend/package-lock.json

      - name: Install deps
        working-directory: crm-backend
        run: npm ci

      - name: Generate Prisma client
        working-directory: crm-backend
        run: npx prisma generate

      - name: Run unit tests
        working-directory: crm-backend
        run: npm run test:cov
        env:
          NODE_ENV: test

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: crm-backend/coverage/
          retention-days: 7

  # ────────────────────────────────────────────────────────────────────────────
  # Build — compile both apps to catch build-time errors
  # ────────────────────────────────────────────────────────────────────────────
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: |
            crm-backend/package-lock.json
            crm-frontend/package-lock.json

      - name: Install & build backend
        working-directory: crm-backend
        run: |
          npm ci
          npx prisma generate
          npm run build

      - name: Install & build frontend
        working-directory: crm-frontend
        run: |
          npm ci
          npm run build
        env:
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_TELEMETRY_DISABLED: 1

  # ────────────────────────────────────────────────────────────────────────────
  # Docker Build — verify images build correctly (no push on PRs)
  # ────────────────────────────────────────────────────────────────────────────
  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test, build]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build backend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./crm-backend
          push: false
          tags: nexus-crm-api:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build frontend image (no push)
        uses: docker/build-push-action@v5
        with:
          context: ./crm-frontend
          push: false
          tags: nexus-crm-web:ci
          build-args: |
            NEXT_PUBLIC_API_URL=http://localhost:3001
          cache-from: type=gha
          cache-to: type=gha,mode=max
