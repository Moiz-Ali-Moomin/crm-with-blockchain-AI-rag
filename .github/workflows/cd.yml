name: CD

on:
  workflow_run:
    workflows: ["CI"]
    types:
      - completed
  workflow_dispatch:

concurrency:
  group: cd-production
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event_name == 'workflow_run' &&
        github.event.workflow_run.conclusion == 'success'
      )

    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            set -e

            echo "[INFO] Navigating to project..."
            cd /opt/crm-with-blockchain-rag

            echo "[INFO] Forcing clean git state..."
            git fetch origin main
            git reset --hard origin/main
            git clean -fd

            echo "[INFO] Saving backup images..."
            docker tag crm-with-blockchain-rag-api:latest crm-api-backup || true
            docker tag crm-with-blockchain-rag-web:latest crm-web-backup || true

            echo "[INFO] Building & starting containers..."
            docker compose up -d --build

            echo "[INFO] Waiting for API to be ready..."
            SUCCESS=0

            for i in {1..30}; do
              if curl -k -f https://bestpurchasestore.com/api/v1/health; then
                echo "✅ API is up"
                SUCCESS=1
                break
              fi
              echo "⏳ Attempt $i failed, retrying in 5s..."
              sleep 5
            done

            if [ "$SUCCESS" != "1" ]; then
              echo "❌ Deployment failed, rolling back..."

              docker compose down

              docker tag crm-api-backup crm-with-blockchain-rag-api:latest || true
              docker tag crm-web-backup crm-with-blockchain-rag-web:latest || true

              docker compose up -d

              echo "⚠️ Rolled back to previous version"
              exit 1
            fi

            echo "[INFO] Running containers:"
            docker ps

            echo "[INFO] Latest commit:"
            git log -1 --oneline